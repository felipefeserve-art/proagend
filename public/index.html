<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link
  rel="icon"
  href="/img/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - PRO AGEND</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  background:
    linear-gradient(
    90deg,
    rgba(8,8,8,.95),
    rgba(18,14,10,.82),
    rgba(35,25,15,.45)
  ),
    url("/img/login-bg.png");
  background-size:cover;
  background-position:center;
  color:white;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:40px;
}

.loginCard{
  width:100%;
  max-width:430px;
  background: rgba(12,12,12,.80);
  backdrop-filter:blur(14px);
  border:1px solid rgba(243,210,122,.15);
  border-radius:28px;
  padding:34px;
  box-shadow:
    0 25px 60px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.logo{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:25px;
}

.logoIcon{

  width:60px;

  height:60px;

  border-radius:18px;

  background:none;
  box-shadow:none;
    

  display:flex;

  align-items:center;

  justify-content:center;

  overflow:hidden;

}

.logoIcon img{

  width:68px;

  height:68px;

  object-fit:contain;

}

.logoTexto h1{
  font-family:'Poppins',sans-serif;
  margin:0;
  font-size:28px;
  line-height:1;
  letter-spacing:-.8px;
  color:#f3d27a;
}

.logoTexto span{
  color:#94a3b8;
  font-size:13px;
}

.titulo{
  margin:0 0 8px;
  font-family:'Poppins',sans-serif;
  font-size:24px;
  color:#f3d27a;
}

.subtitulo{
  color:#cbd5e1;
  margin-bottom:25px;
  font-size:14px;
  line-height:1.5;
}

.campo{
  margin-bottom:14px;
}

.campo label{
  display:block;
  margin-bottom:6px;
  font-size:13px;
  color:#cbd5e1;
}

input{
  width:100%;
  height:52px;
  border:none;
  border-radius:16px;
  padding:0 16px;
  background:rgba(30,41,59,.95);
  color:white;
  font-size:15px;
  outline:none;
  transition:.2s;
}

input::placeholder{
  color:#64748b;
}

input:focus{

  box-shadow:
    0 0 0 2px #c99a3d,
    0 10px 25px rgba(201,154,61,.18);

}

button{
  width:100%;
  height:54px;
  margin-top:12px;
  border:none;
  border-radius:16px;
  background:
    linear-gradient(
      90deg,
      #b8862b,
      #d4af37,
      #f3d27a
    );

  color:#111827;

  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
   box-shadow:
    0 16px 35px rgba(212,175,55,.40);
}

.rodape{
  margin-top:22px;
  text-align:center;
  color:#94a3b8;
  font-size:12px;
}

.destaque{
  position:absolute;
  left:55px;
  bottom:55px;
  max-width:520px;
}

.destaque h2{
  font-family:'Poppins',sans-serif;
  font-size:42px;
  line-height:1.1;
  margin:0 0 12px;
  color:#f3d27a;
  text-shadow:
    0 4px 20px rgba(0,0,0,.5);
}

.destaque p{
  color:#cbd5e1;
  font-size:16px;
  line-height:1.6;
}

@media(max-width:900px){

  body{
    justify-content:center;
    padding:20px;
    background:
      linear-gradient(
    rgba(8,8,8,.88),
    rgba(15,12,8,.94)
  ),
      url("/img/login-bg.png");
    background-size:cover;
    background-position:center;
  }

  .destaque{
    display:none;
  }

}

@media(max-width:480px){

  .loginCard{
    padding:24px;
    border-radius:22px;
  }

  .logoIcon{
    width:48px;
    height:48px;
    font-size:24px;
  }

  .logoTexto h1{
    font-size:24px;
  }

  .titulo{
    font-size:21px;
  }

  input,
  button{
    height:50px;
  }

}

</style>

</head>

<body>

<div class="destaque">

  <h2>
    Controle sua agenda com mais profissionalismo.
  </h2>

  <p>
    Organize atendimentos, profissionais, serviços e horários em uma única plataforma.
  </p>

</div>

<div class="loginCard">

  <div class="logo">

    <div class="logoIcon">

  <img
    src="/img/logo.png"
    alt="PRO AGEND">

</div>

    <div class="logoTexto">

      <h1>PRO AGEND</h1>

      <span>
        Sistema de Agendamento
      </span>

    </div>

  </div>

  <h2 class="titulo">
    Acesse sua conta
  </h2>

  <div class="subtitulo">
    Entre para gerenciar sua agenda, profissionais e atendimentos.
  </div>

  <div class="campo">

    <label>Usuário</label>

    <input
      id="usuario"
      placeholder="Digite seu usuário">

  </div>

  <div class="campo">

    <label>Senha</label>

    <input
      id="senha"
      type="password"
      placeholder="Digite sua senha">

  </div>

  <button onclick="logar()">
    Entrar no Sistema
  </button>

  <div class="rodape">
    © PRO AGEND - Gestão de Agendamentos
  </div>

</div>

<script>

async function logar(){

  const usuario =
    document.getElementById("usuario")
      .value
      .trim();

  const senha =
    document.getElementById("senha")
      .value
      .trim();

  if(!usuario){
    alert("Informe o usuário.");
    return;
  }

  if(!senha){
    alert("Informe a senha.");
    return;
  }

  const resposta = await fetch("/login",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({
      usuario,
      senha
    })

  });

  const dados = await resposta.json();

  if(!resposta.ok){

    alert(dados.erro);

    return;

  }

  localStorage.setItem(
    "token",
    dados.token
  );

  location.href = "/dashboard.html";

}

document.addEventListener("keydown",(e)=>{

  if(e.key === "Enter"){
    logar();
  }

});

</script>

</body>
</html>
